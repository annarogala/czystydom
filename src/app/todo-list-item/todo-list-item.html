<!-- View mode -->
<div *ngIf="editingId() !== todo.id" class="todo-view">
  <div class="todo-header">
    <h3 class="todo-title">{{ todo.description }}</h3>

    <button (click)="startEdit(todo)" class="btn btn-secondary" title="Edytuj" type="button">
      ✏️
    </button>
    <!-- <button (click)="todoDeleted.emit(todo.id)" class="btn btn-danger" title="Usuń" type="button">
      🗑️
    </button> -->
    <button
      (click)="markAsCleaned(todo)"
      class="btn btn-success"
      title="Oznacz jako sprzątane"
      type="button"
    >
      ✓ Sprzątane
    </button>
  </div>

  <div class="todo-details">
    <div class="detail-item">
      <span class="location-badge">{{ todo.location }}</span>
    </div>
    <div class="detail-item">
      <span class="label">Interwał:</span>
      <span class="value">{{ todo.interval }}</span>
    </div>
    <div class="detail-item">
      <span class="label">Ostatnie sprzątanie:</span>
      <span class="value">{{ formatDate(todo.lastCleaned) }}</span>
    </div>
    <div class="detail-item">
      <div class="status-bar">
        <span [class]="'status-label ' + getStatusClass(todo)">
          {{ getStatusText(todo) }}
        </span>
      </div>
    </div>
  </div>
</div>
<!-- Edit mode -->
<div *ngIf="editingId() === todo.id" class="todo-edit">
  <div class="form-group">
    <label>Opis obowiązku:</label>
    <input
      type="text"
      [ngModel]="editDescription()"
      (ngModelChange)="editDescription.set($event)"
      class="edit-input"
    />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Pomieszczenie:</label>
      <select [ngModel]="editLocation()" (ngModelChange)="editLocation.set($event)">
        <option *ngFor="let location of locations" [value]="location">{{ location }}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Interwał:</label>
      <select [ngModel]="editInterval()" (ngModelChange)="editInterval.set($event)">
        <option *ngFor="let interval of intervals" [value]="interval">{{ interval }}</option>
      </select>
    </div>
  </div>

  <div class="edit-actions">
    <div class="edit-actions-buttons">
      <button (click)="saveEdit(todo)" class="btn btn-success" type="button">✓ Zapisz</button>
      <button (click)="cancelEdit()" class="btn btn-secondary" type="button">✕ Anuluj</button>
    </div>
    <button (click)="deleteTodo(todo)" class="btn btn-danger" title="Usuń" type="button">🗑️</button>
  </div>
</div>

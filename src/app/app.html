<div class="container">
  <header>
    <h1>🏠 {{ title() }}</h1>
    <p class="subtitle">Zarządzaj obowiązkami domowymi</p>
  </header>

  <!-- Add new todo form -->
  <section class="add-form">
    <h2>Dodaj nowy obowiązek</h2>
    <form (ngSubmit)="addTodo()" class="form">
      <div class="form-group">
        <label for="description">Opis obowiązku:</label>
        <input type="text" id="description" [ngModel]="newDescription()" (ngModelChange)="newDescription.set($event)"
          name="description" placeholder="np. Umyć podłogę" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="room">Pomieszczenie:</label>
          <select id="room" [ngModel]="newRoom()" (ngModelChange)="newRoom.set($event)" name="room">
            <option *ngFor="let room of rooms" [value]="room">{{ room }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="interval">Interwał:</label>
          <select id="interval" [ngModel]="newInterval()" (ngModelChange)="newInterval.set($event)" name="interval">
            <option *ngFor="let interval of intervals" [value]="interval">{{ interval }}</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Dodaj obowiązek</button>
    </form>
  </section>

  <!-- Sort controls -->
  <section class="sort-controls">
    <h3>Sortuj według:</h3>
    <div class="sort-buttons">
      <button [class.active]="sortBy() === 'time'" (click)="setSortBy('time')" class="btn btn-sort">
        ⏱️ Czasu od sprzątania
      </button>
      <button [class.active]="sortBy() === 'alphabet'" (click)="setSortBy('alphabet')" class="btn btn-sort">
        🔤 Alfabetycznie
      </button>
      <button [class.active]="sortBy() === 'room'" (click)="setSortBy('room')" class="btn btn-sort">
        🏠 Pomieszczenia
      </button>
    </div>
  </section>

  <!-- Todo list -->
  <section class="todo-list">
    <h2>Lista obowiązków ({{ sortedTodos().length }})</h2>

    <div *ngIf="sortedTodos().length === 0" class="empty-state">
      <p>Brak obowiązków. Dodaj pierwszy!</p>
    </div>

    <div class="todo-items">
      <TodoListItem class="todo-item" *ngFor="let todo of sortedTodos()" [todo]="todo"
        (todoUpdated)="onTodoUpdated($event)" (todoDeleted)="onTodoDeleted($event)" />
    </div>
  </section>
</div>
